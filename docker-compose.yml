services:
  redis:
    image: redis/redis-stack-server:latest
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --unixsocket
      - /var/run/redis/redis.sock
      - --unixsocketperm
      - "777"
    volumes:
      - redis-socket:/var/run/redis
    healthcheck:
      test: ["CMD", "redis-cli", "-s", "/var/run/redis/redis.sock", "PING"]
      interval: 5s
      timeout: 3s
      retries: 10

  otlp-redis-metrics:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    command: ["--config_json=/app/config.json"]
    volumes:
      - ./docker/config.unixsocket.json:/app/config.json:ro
      - redis-socket:/var/run/redis
    ports:
      - "4317:4317"

volumes:
  redis-socket:
